name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        env:
          ANTHROPIC_API_KEY: "sk-ant-test-key-ci-only"
          ENABLE_AUDIT_LOG: "false"
        run: |
          pytest tests/ -v --tb=short --junitxml=test-results.xml -W ignore::pytest.PytestUnraisableExceptionWarning
      - name: Test Summary
        if: always()
        run: |
          echo "## Test Results (Python ${{ matrix.python-version }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('test-results.xml')
          root = tree.getroot()
          ts = root.find('.//testsuite') or root
          tests = ts.get('tests', '0')
          failures = ts.get('failures', '0')
          errors = ts.get('errors', '0')
          time = ts.get('time', '0')
          print(f'| Metric | Value |')
          print(f'|--------|-------|')
          print(f'| Tests | {tests} |')
          print(f'| Failures | {failures} |')
          print(f'| Errors | {errors} |')
          print(f'| Time | {float(time):.1f}s |')
          " >> $GITHUB_STEP_SUMMARY

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5.6.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Ruff check
        run: ruff check phlegyas/ tests/
      - name: Ruff format check
        run: ruff format --check phlegyas/ tests/

  merge-checks:
    uses: innago-property-management/Oui-DELIVER/.github/workflows/merge-checks-python.yml@main
    with:
      python_version: "3.12"
      requirements_file: "requirements-ci.txt"
      allowed_licenses: "MIT|Apache|BSD|ISC|PSF|Python|Unlicense|CC0|0BSD|WTFPL|MPL|UNKNOWN"
    secrets:
      githubToken: ${{ secrets.GITHUB_TOKEN }}
