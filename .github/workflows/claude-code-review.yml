name: PR Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    permissions:
      contents: read
      pull-requests: write
      id-token: write
      actions: read
    steps:    
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: PR Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Perform a comprehensive code review. Follow these steps in order:

            1. Fetch the PR diff:
               gh pr diff ${{ github.event.pull_request.number }}

            2. Fetch PR metadata:
               gh pr view ${{ github.event.pull_request.number }}

            3. Analyze all changes across these focus areas:

               **Code Quality**
               - Clean code principles and best practices
               - Proper error handling and edge cases
               - Code readability and maintainability

               **Security**
               - Potential security vulnerabilities
               - Input sanitization and validation
               - Authentication and authorization logic

               **Performance**
               - Potential performance bottlenecks
               - Database query efficiency
               - Memory leaks or resource issues

               **Testing**
               - Adequate test coverage for changed code
               - Test quality and edge cases
               - Missing test scenarios

               **Documentation**
               - Code comments where logic is non-obvious
               - README updates for new features
               - API documentation accuracy

            4. Collect all issues with their exact file path and diff line position.

            5. Choose a verdict:
               - Use REQUEST_CHANGES if any of these are present: security vulnerabilities,
                 broken logic, missing error handling on critical paths, failing or absent tests
                 for new behaviour, or use of deprecated/unsafe APIs.
               - Use APPROVE if the code is correct and issues are minor style nits only.
               - Use COMMENT for purely advisory observations with no blocking issues.

            6. Submit ONE batched review using the GitHub API. Do NOT post individual
               gh pr comment calls — all feedback must go through this single call:

               gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \\
                 --method POST \\
                 -f body="<overall summary + agent fix prompt if REQUEST_CHANGES — see step 7>" \\
                 -f event="<APPROVE|REQUEST_CHANGES|COMMENT>" \\
                 -f "comments[][path]=<file path>" \\
                 -f "comments[][position]=<diff position>" \\
                 -f "comments[][body]=<comment text>"

               Note: position is the line number within the unified diff output (counting from
               the first @@ hunk header of each file), not the source file line number.
               Omit the comments[] fields entirely if there are no inline issues.

            7. If and only if the verdict is REQUEST_CHANGES, append the following block
               at the end of the review body (the -f body= value in step 6):

               ---

               <details>
               <summary>🤖 Agent fix prompt</summary>

               ```
               Address the following review findings on PR #${{ github.event.pull_request.number }}
               in repo ${{ github.repository }}, branch <head branch from gh pr view>:

               [TYPE] path/to/file line N — one-sentence imperative fix instruction
               ...

               Run tests after all fixes. Push to the same branch.
               ```

               </details>

               Rules for the agent fix prompt:
               - [TYPE] is one of: SECURITY, BUG, MISSING-TEST, PERF, DOCS, STYLE
               - One line per issue, imperative mood, no explanation or suggested code
               - Maximum 20 lines total
               - Omit STYLE issues unless they are the only findings
               - Do not repeat the inline comment text verbatim — distil to the minimum
                 actionable instruction

          claude_args: |
            --allowedTools "Bash(gh pr:*),Bash(gh api:*)"
