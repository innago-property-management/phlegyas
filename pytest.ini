[pytest]
# Pytest configuration for claude-permission-approver

# Asyncio configuration
asyncio_mode = auto

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes

# Markers
markers =
    unit: Unit tests for individual components
    integration: Integration tests for multi-tier flow
    asyncio: Tests that use async/await

# Warnings
filterwarnings =
    error
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Coverage options (if pytest-cov is installed)
# Uncomment to enable coverage reporting
# addopts =
#     --cov=src
#     --cov-report=html
#     --cov-report=term-missing
